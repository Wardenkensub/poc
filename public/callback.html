<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SSO Capture</title>
</head>
<body>

  <pre id="out"></pre>

  <script>
    const data = {
      href: location.href,
      hash: location.hash,
      search: location.search,
      at: new Date().toISOString()
    };

    document.getElementById("out").textContent = JSON.stringify(data, null, 2);
    console.log(data);
  </script>

</body>
</html>
