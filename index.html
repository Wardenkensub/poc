<!doctype html>
<meta charset="utf-8">
<title>ChicksGroup SSO Redirect PoC</title>

<style>
  body {
    font-family: system-ui, sans-serif;
    padding: 24px;
  }
  pre {
    background: #111;
    color: #eee;
    padding: 16px;
    white-space: pre-wrap;
  }
</style>

<h1>Captured Redirect</h1>
<pre id="out"></pre>

<script>
  const data = {
    href: location.href,
    origin: location.origin,
    pathname: location.pathname,
    search: location.search,
    hash: location.hash,
    referrer: document.referrer,
    userAgent: navigator.userAgent,
    at: new Date().toISOString()
  };

  document.getElementById("out").textContent = JSON.stringify(data, null, 2);
  console.log("SSO redirect PoC captured:", data);

  // Optional: send to your own logging endpoint if you add one later.
  // fetch("/api/log", {
  //   method: "POST",
  //   headers: {"content-type": "application/json"},
  //   body: JSON.stringify(data)
  // }).catch(() => {});
</script>
